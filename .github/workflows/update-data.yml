name: Update GA groundwater data and deploy

on:
  schedule:
    - cron: "43 10 * * *"    # daily at 10:43 UTC (~6:43 am Eastern), after USGS posts yesterday's daily values
  workflow_dispatch:          # manual "Run workflow" button
  push:
    branches: [main]          # also redeploy whenever you change the code

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore field measurements from the release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release download field-measurements -p measurements.tar.gz -D /tmp 2>/dev/null; then
            mkdir -p data
            tar -xzf /tmp/measurements.tar.gz -C data
            echo "restored $(ls data/discrete | wc -l) well files"
          else
            echo "no measurements store yet - a fresh sweep will run"
          fi

      - name: Download all GA groundwater levels from USGS
        run: python download_ga_groundwater.py
        env:
          USGS_API_KEY: ${{ secrets.USGS_API_KEY }}
          DISCRETE_SWEEP_BUDGET_MIN: "30"
          DISCRETE_REUSE_DAYS: "2"
        timeout-minutes: 60

      - name: Update the measurements release store
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f data/discrete_marker.txt ] && [ -z "$(find data/discrete_marker.txt -mmin +90)" ]; then
            tar -czf /tmp/measurements.tar.gz -C data discrete discrete_marker.txt
            gh release view field-measurements >/dev/null 2>&1 || \
              gh release create field-measurements --title "Field measurements store" \
                --notes "Rolling store of USGS field measurements reused by the daily build when the measurements API is rate-limited."
            gh release upload field-measurements /tmp/measurements.tar.gz --clobber
            echo "release store updated"
          else
            echo "measurements unchanged this run; store not updated"
          fi

      - name: Build viewer data files
        run: python build_viewer_data.py

      - name: Assemble site
        run: |
          mkdir -p site/data
          cp ga_groundwater_explorer.html site/index.html
          cp data/sites_index.js site/data/
          cp data/sites_metadata.csv site/data/
          cp -r data/sites site/data/sites
          du -sh site

      - name: Update the dataset release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tar -czf /tmp/dataset.tar.gz -C data csv discrete sites_metadata.csv
          gh release view dataset >/dev/null 2>&1 ||             gh release create dataset --title "Complete dataset (CSV)"               --notes "Nightly-refreshed archive of all well CSVs (daily values and field measurements) and metadata. Source: USGS NWIS; recent values provisional."
          gh release upload dataset /tmp/dataset.tar.gz --clobber
          echo "dataset release updated"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4

  retry-on-transient-failure:
    needs: build-and-deploy
    if: failure() && fromJSON(github.run_attempt) < 3
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Wait out the outage and retry the failed jobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 900
          gh run rerun ${{ github.run_id }} --failed --repo ${{ github.repository }} || \
            echo "retry could not be triggered (already re-run or not retryable)"
